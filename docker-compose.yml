services:
  db:
    image: postgres:16-alpine
    container_name: opportunity_engine_db
    environment:
      POSTGRES_DB: opportunity_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: opportunity_engine_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/opportunity_engine
    ports:
      - "8004:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: opportunity_engine_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: opportunity_engine_test
    profiles:
      - test

volumes:
  pgdata:
